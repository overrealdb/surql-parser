[graph]
targets = []
all-features = false

[advisories]
version = 2
ignore = [
    # Dev-dependency only (testcontainers → bollard → rsa)
    "RUSTSEC-2023-0071",
    # Dev-dependency only (testcontainers → tokio-tar)
    "RUSTSEC-2025-0111",
    # Dev-dependency only (testcontainers → bollard → rustls-pemfile)
    "RUSTSEC-2025-0141",
    # Dev-dependency only
    "RUSTSEC-2025-0134",
]

[licenses]
version = 2
# surrealdb crates don't set license field in Cargo.toml (it's BUSL-1.1 in LICENSE file)
unlicensed = "allow"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    "BSL-1.0",
    "MPL-2.0",
    "BUSL-1.1",   # surrealdb (dev-dep only)
]
confidence-threshold = 0.8

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
