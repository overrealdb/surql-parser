[workspace]
# release-plz resolves publish order from dependency graph:
# surql-parser first, then surql-macros (depends on surql-parser)
publish_timeout = "30s"
git_tag_enable = true
git_release_enable = true

# --- Crates NOT to release ---

[[package]]
name = "surql-sample-project"
release = false
publish = false

[[package]]
name = "surql-transform"
release = false
publish = false

# LSP and MCP depend on new surql-parser API not yet on crates.io.
# Publish manually after surql-parser is released, then remove these entries.
[[package]]
name = "surql-lsp"
release = false
publish = false

[[package]]
name = "surql-mcp"
release = false
publish = false
