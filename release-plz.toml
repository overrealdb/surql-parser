[workspace]
# release-plz resolves publish order from dependency graph:
# surql-parser first, then surql-macros (depends on surql-parser)
publish_timeout = "30s"
git_tag_enable = true
git_release_enable = true

# --- Crates NOT to release ---

[[package]]
name = "surql-sample-project"
release = false
publish = false

[[package]]
name = "surql-transform"
release = false
publish = false
