name: CI
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

# Prevent fork PRs from accessing secrets
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast: check + test + clippy + fmt + coverage (~3 min)
  ci:
    runs-on: ubuntu-latest
    # On PRs: require maintainer approval via "ci" environment (skip for release-plz)
    environment: ${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-plz-') && 'ci' || '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: davidB/rust-cargo-make@v1
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo make ci
      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false

  # CLI: build + smoke test (~2 min)
  cli:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-plz-') && 'ci' || '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --features cli
      - name: Smoke test CLI
        run: |
          echo "DEFINE TABLE user SCHEMAFULL;" > /tmp/test.surql
          cargo run --features cli -- check /tmp/test.surql
          cargo run --features cli -- info /tmp/test.surql

  # Docker validation — runs after fast checks pass (on main and approved PRs)
  validate:
    needs: [ci, cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --features validate-docker
