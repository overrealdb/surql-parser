name: CI
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

# Prevent fork PRs from accessing secrets
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast: check + test + clippy + fmt (~2 min)
  ci:
    runs-on: ubuntu-latest
    # On PRs: require maintainer approval via "ci" environment (skip for release-plz)
    environment: ${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-plz-') && 'ci' || '' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: davidB/rust-cargo-make@v1
      - run: cargo make ci

  # CLI: build + smoke test (~2 min)
  cli:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-plz-') && 'ci' || '' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --features cli
      - name: Smoke test CLI
        run: |
          echo "DEFINE TABLE user SCHEMAFULL;" > /tmp/test.surql
          cargo run --features cli -- check /tmp/test.surql
          cargo run --features cli -- schema /tmp/test.surql

  # Docker validation — only on main, after fast checks pass
  validate:
    needs: [ci, cli]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --features validate-docker
