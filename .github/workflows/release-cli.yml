name: Build CLI

# Triggered when release-plz creates a GitHub release
on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --release --features cli --target "$TARGET"

      - name: Package
        shell: bash
        run: |
          BIN="target/${TARGET}/release/surql"
          ARCHIVE="surql-${GITHUB_REF_NAME}-${TARGET}.tar.gz"
          tar czf "$ARCHIVE" -C "$(dirname "$BIN")" "$(basename "$BIN")"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Attach to release
        run: gh release upload "$GITHUB_REF_NAME" "$ARCHIVE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
