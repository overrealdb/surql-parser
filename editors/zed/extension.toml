id = "surrealql"
name = "SurrealQL"
description = "SurrealQL language support — syntax highlighting, completions, diagnostics, hover, formatting, embedded DB playground"
version = "0.2.0"
schema_version = 1
authors = ["overrealdb"]
repository = "https://github.com/overrealdb/surql-parser"

[grammars.surrealql]
repository = "https://github.com/overrealdb/tree-sitter-surrealql"
rev = "191cc5e250bedf6106c34f65be3e238a0a6f97cb"

[language_servers.surql-lsp]
name = "surql-lsp"
languages = ["SurrealQL", "Rust"]

[context_servers.surql-mcp]
name = "SurrealQL Playground"

[slash_commands.surql-schema]
description = "Show SurrealQL schema from workspace .surql files"
requires_argument = false

[slash_commands.surql-relations]
description = "Show table relationships graph (record links)"
requires_argument = false

[slash_commands.surql-info]
description = "Workspace summary: tables, fields, indexes, functions, files"
requires_argument = false
